<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>YouTube Roulette</title>
    <meta name="description" content="YouTube Roulette — Find the weirdest videos. Win the game.">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎰</text></svg>">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;900&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css?v=40">
</head>
<body>
    <div id="room-code-badge" class="room-badge hidden"></div>
    <div id="toast-container"></div>
    <div id="conn-pill-host"></div>
    <div id="app"></div>

    <!-- YouTube player lives OUTSIDE #app so morphdom never touches it -->
    <div id="yt-player-wrapper" class="yt-player-wrapper hidden">
        <div id="yt-player"></div>
    </div>

    <!-- Hub overlay (countdown, curtain) and banner (join fanfare) — outside #app, JS-owned lifecycle -->
    <div id="hub-overlay" class="hub-overlay" aria-hidden="true"></div>
    <div id="hub-banner" class="hub-banner" aria-hidden="true"></div>

    <script src="https://cdn.jsdelivr.net/npm/qrious@4.0.2/dist/qrious.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/morphdom@2/dist/morphdom-umd.min.js"></script>
    <script src="https://www.youtube.com/iframe_api"></script>
    <script type="module" src="js/app.js?v=40"></script>
</body>
</html>
